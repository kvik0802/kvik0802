# Save this file as: .github/workflows/pacman.yml
# in your kvik0802/kvik0802 repo

name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Pac-Man contribution graph
        uses: Platane/snk@v3
        id: skip-this-if-using-pacman-action
        continue-on-error: true

      # --- Pac-Man specific action ---
      - uses: actions/checkout@v4
      - name: Generate pacman graph
        uses: abozanona/pacman-contribution-graph@v1
        with:
          github_user_name: kvik0802
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?theme=dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
